<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>STAR BREAKER</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Exo+2:wght@300;400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="game-container">
    <!-- スタート画面 -->
    <div id="start-overlay">
      <div class="stars-bg"></div>
      <div id="sf-container"></div>
      <div class="start-content">
        <div class="start-subtitle">A LONG TIME AGO IN A GALAXY FAR, FAR AWAY...</div>
        <div class="start-title">STAR<br>BREAKER</div>
        <div class="start-version">EPISODE III — ver 3.3.6</div>
        <div class="start-description">銀河に散らばるブロックを<br>すべて破壊せよ</div>
        <div class="start-buttons">
          <button id="start-btn">
            <span class="btn-icon">▶</span>
            <span class="btn-text">LAUNCH</span>
          </button>
          <button id="stage-select-btn">
            <span class="btn-icon">☰</span>
            <span class="btn-text">STAGE SELECT</span>
          </button>
        </div>
        <div class="start-controls">
          <div class="control-item">◀ ▶ パドル移動</div>
          <div class="control-item">マウス / タッチ対応</div>
        </div>
      </div>
    </div>

    <!-- ステージセレクト -->
    <div id="stage-select" class="hidden">
      <div class="ss-header">
        <div class="ss-title">STAGE SELECT</div>
        <button id="ss-back-btn">✕</button>
      </div>
      <div id="ss-grid"></div>
    </div>

    <!-- HUD -->
    <div id="hud">
      <div id="hud-left">
        <div class="hud-label">SCORE</div>
        <div id="hud-score">0</div>
      </div>
      <div id="hud-center">
        <div id="hud-stage">STAGE 1</div>
        <div id="hud-stage-name"></div>
        <div id="hud-combo" class="hidden">COMBO x<span id="combo-count">2</span></div>
      </div>
      <div id="hud-right">
        <div class="hud-label">LIVES</div>
        <div id="hud-lives">
          <span class="life active"></span>
          <span class="life active"></span>
          <span class="life active"></span>
        </div>
        <button id="pause-btn" title="一時停止" aria-label="Pause" class="hud-btn">Ⅱ</button>
      </div>
    </div>
      <!-- ポーズ表示 -->
      <div id="pause-overlay" class="hidden">
        <div class="pause-text">PAUSED</div>
      </div>

    <!-- ステージ遷移 -->
    <div id="stage-transition">
      <div class="stage-num"></div>
      <div class="stage-planet"></div>
      <div class="stage-desc"></div>
    </div>

    <!-- ゲームメッセージ -->
    <div id="game-message" class="hidden">
      <div id="msg-title"></div>
      <div id="msg-sub"></div>
      <div class="msg-buttons">
        <button id="msg-btn" class="hidden">RETRY</button>
        <button id="msg-title-btn" class="hidden">TITLE</button>
      </div>
    </div>
  </div>

  <script src="main.js" type="module"></script>
</body>
</html>
